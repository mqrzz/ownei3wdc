<style>
/* ═══════════════════════════════════════
   CSS ПЕРЕМЕННЫЕ
═══════════════════════════════════════ */
:root {
  --bg: #f5f5f7;
  --bg2: #ffffff;
  --text: #1d1d1f;
  --text-light: #4a4a4e;
  --text-muted: #86868b;
  --border: 1px solid rgba(0,0,0,0.07);
  --border-strong: 1px solid rgba(0,0,0,0.12);
  --glass: rgba(255,255,255,0.72);
  --glass2: rgba(255,255,255,0.88);
  --glass-card: rgba(255,255,255,0.68);
  --glass-card2: rgba(255,255,255,0.85);
  --header-bg: rgba(255,255,255,0.78);
  --footer-bg: #1d1d1f;
  --footer-text: #f5f5f7;
  --footer-text-muted: #86868b;
  --glass-edge: rgba(255,255,255,0.65);
  --shadow-xs: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-sm: 0 4px 14px rgba(0,0,0,0.08);
  --shadow-md: 0 12px 32px rgba(0,0,0,0.10);
  --shadow-lg: 0 24px 56px rgba(0,0,0,0.13);
  --shadow-xl: 0 40px 90px rgba(0,0,0,0.17);
  --red: #c41e1e;
  --red-hover: #a51515;
  --red-light: rgba(196,30,30,0.1);
  --gray-mid: #d2d2d6;
  --green: #34c759;
  --orange: #ff9500;
  --fs: 16px; /* базовый шрифт — меняется JS */
}
[data-theme="dark"] {
  --bg: #1a1a1c; --bg2: #2a2a2e;
  --text: #f2f2f7; --text-light: #c7c7cc; --text-muted: #8e8e93;
  --border: 1px solid rgba(255,255,255,0.08);
  --border-strong: 1px solid rgba(255,255,255,0.14);
  --glass: rgba(38,38,42,0.72); --glass2: rgba(38,38,42,0.88);
  --glass-card: rgba(44,44,46,0.68); --glass-card2: rgba(58,58,60,0.85);
  --header-bg: rgba(28,28,30,0.82);
  --footer-bg: #000; --footer-text: #f2f2f7; --footer-text-muted: #8e8e93;
  --glass-edge: rgba(255,255,255,0.13);
  --shadow-xs: 0 1px 4px rgba(0,0,0,0.3); --shadow-sm: 0 4px 14px rgba(0,0,0,0.38);
  --shadow-md: 0 12px 32px rgba(0,0,0,0.48); --shadow-lg: 0 24px 56px rgba(0,0,0,0.58);
  --shadow-xl: 0 40px 90px rgba(0,0,0,0.68);
  --red: #ff453a; --red-hover: #ff6961; --red-light: rgba(255,69,58,0.13);
  --gray-mid: #3a3a3c;
}
[data-theme="high-contrast"] {
  --bg:#000;--bg2:#000;--text:#ff0;--text-light:#ff0;--text-muted:#ff0;
  --border:2px solid #ff0;--border-strong:2px solid #ff0;
  --glass:#000;--glass2:#000;--glass-card:#000;--glass-card2:#000;
  --header-bg:#000;--glass-edge:#ff0;
  --footer-bg:#000;--footer-text:#ff0;--footer-text-muted:#ff0;
  --shadow-xs:none;--shadow-sm:none;--shadow-md:none;--shadow-lg:none;--shadow-xl:none;
  --red:#ff0;--red-hover:#ff0;--red-light:transparent;--gray-mid:#ff0;
}
[data-theme="high-contrast"] * { border-color:#ff0!important;color:#ff0!important;background:#000!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;box-shadow:none!important; }
[data-theme="high-contrast"] img { filter:grayscale(100%) contrast(200%); }

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Source Serif 4',Georgia,serif;
  background:var(--bg);color:var(--text);
  font-size:var(--fs);line-height:1.65;
  transition:background .25s,color .25s;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════ */
@keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes popIn{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ═══════════════════════════════════════
   PRELOADER
═══════════════════════════════════════ */
.preloader{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s;}
.preloader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.preloader-content{text-align:center;}
.preloader-logo img{max-width:300px;height:auto;margin-bottom:32px;}
.preloader-spinner{width:44px;height:44px;border:3px solid var(--gray-mid);border-top-color:var(--red);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 18px;}
.preloader-text{font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text-muted);letter-spacing:.06em;}

/* ═══════════════════════════════════════
   READING PROGRESS
═══════════════════════════════════════ */
.reading-progress{position:fixed;top:0;left:0;width:0;height:3px;background:var(--red);z-index:9999;transition:width .1s linear;border-radius:0 2px 2px 0;}

/* ═══════════════════════════════════════
   BREAKING TICKER
═══════════════════════════════════════ */
.breaking-ticker{background:var(--red);color:#fff;padding:7px 0;overflow:hidden;position:relative;z-index:55;}
.ticker-inner{display:flex;align-items:center;}
.ticker-label{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(0,0,0,0.22);padding:4px 16px;white-space:nowrap;flex-shrink:0;margin-right:14px;border-radius:0 4px 4px 0;}
.ticker-track{display:flex;animation:marquee 55s linear infinite;white-space:nowrap;}
.ticker-track:hover{animation-play-state:paused;}
.ticker-item{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;padding:0 34px;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
.ticker-item:hover{opacity:.75;}
.ticker-sep{opacity:.32;}

/* ═══════════════════════════════════════
   TOP BAR (ПК + ТЕПЕРЬ И МОБИЛЬНЫЕ)
═══════════════════════════════════════ */
.top-bar{background:var(--glass2);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-bottom:var(--border);padding:9px 0;}
.top-bar-inner{max-width:1320px;margin:0 auto;padding:0 28px;display:flex;justify-content:space-between;align-items:center;gap:14px;}
.top-bar-left{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.top-bar-actions{display:flex;gap:7px;align-items:center;}
.pill-btn{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;background:var(--glass-card2);backdrop-filter:blur(12px);border:var(--border-strong);padding:7px 16px;border-radius:40px;cursor:pointer;color:var(--text);transition:all .18s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.pill-btn:hover{background:var(--glass2);box-shadow:var(--shadow-sm);transform:scale(1.02);}
.fontsize-panel{display:flex;align-items:center;gap:4px;}
.fs-btn{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:700;background:var(--glass-card2);backdrop-filter:blur(8px);border:var(--border-strong);width:30px;height:30px;border-radius:50%;cursor:pointer;color:var(--text);transition:all .18s;display:flex;align-items:center;justify-content:center;line-height:1;}
.fs-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
/* Показываем на всех экранах, но на мобильных позиционируем иначе */
.top-bar {
  display: block;
}
/* Адаптация для мобильных */
@media(max-width:900px){
  .top-bar-inner {
    flex-direction: column;
    align-items: flex-start;
    padding: 8px 16px;
    gap: 8px;
  }
  .top-bar-left {
    font-size: 11px;
    gap: 12px;
    width: 100%;
    justify-content: space-between;
  }
  .top-bar-actions {
    width: 100%;
    justify-content: space-around;
    border-top: var(--border);
    padding-top: 8px;
  }
  .pill-btn {
    padding: 5px 12px;
    font-size: 11px;
  }
  .fontsize-panel {
    order: 1;
  }
  #themeToggle {
    order: 2;
  }
  #eyeToggle {
    order: 3;
  }
}
@media(max-width:480px){
  .top-bar-left {
    font-size: 10px;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .top-bar-actions {
    flex-wrap: wrap;
    justify-content: center;
  }
}

/* ═══════════════════════════════════════
   MASTHEAD
═══════════════════════════════════════ */
.masthead{padding:22px 0 16px;text-align:center;position:relative;}
.masthead::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 100%,rgba(196,30,30,0.04),transparent 70%);pointer-events:none;}
.masthead-tagline{font-family:'IBM Plex Sans',sans-serif;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;font-weight:500;}
.masthead-logo{display:inline-flex;justify-content:center;text-decoration:none;}
.masthead-logo img{max-width:360px;height:auto;max-height:88px;object-fit:contain;transition:transform .3s;}
.masthead-logo:hover img{transform:scale(1.01);}
/* Мобильный — только лого, прилипает */
@media(max-width:900px){
  .masthead{position:sticky;top:0;z-index:200;background:var(--glass2);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-bottom:var(--border);padding:10px 0 8px;}
  .masthead-tagline{display:none;}
  .masthead-logo img{max-height:52px;max-width:200px;}
}

/* ═══════════════════════════════════════
   DESKTOP NAV — PILL TABS (ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ)
═══════════════════════════════════════ */
.nav-bar{
  position:sticky;top:0;z-index:190;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:var(--border);
  padding:10px 0;
}
.nav-inner{
  max-width:1320px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;gap:8px;
  overflow-x:auto;scrollbar-width:none;
}
.nav-inner::-webkit-scrollbar{display:none;}

/* Scroll-logo */
.scroll-logo{display:flex;align-items:center;flex-shrink:0;opacity:0;visibility:hidden;transition:opacity .3s;margin-right:6px;}
.scroll-logo.visible{opacity:1;visibility:visible;}
.scroll-logo img{height:32px;width:auto;}

/* Pills container */
.nav-pills{display:flex;gap:5px;align-items:center;flex:1;}

/* Каждая pill */
.npill{
  font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;
  padding:8px 18px;border-radius:40px;cursor:pointer;white-space:nowrap;
  background:transparent;border:none;color:var(--text-light);
  transition:all .2s cubic-bezier(.25,.46,.45,.94);
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.npill:hover{background:var(--glass-card2);color:var(--text);box-shadow:var(--shadow-xs);}
.npill.active{
  background:var(--text);color:var(--bg);
  box-shadow:var(--shadow-sm);
  font-weight:600;
}
[data-theme="dark"] .npill.active{background:var(--text);color:var(--bg);}

/* Search btn */
.nav-search-pill{
  margin-left:auto;flex-shrink:0;
  font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;
  background:var(--glass-card2);backdrop-filter:blur(12px);
  border:var(--border-strong);padding:8px 18px;border-radius:40px;
  cursor:pointer;color:var(--text);transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.nav-search-pill:hover{background:var(--glass2);box-shadow:var(--shadow-sm);}

@media(max-width:900px){.nav-bar{display:none;}}

/* ═══════════════════════════════════════
   MOBILE BOTTOM TAB BAR — ПОЛНОЕ МЕНЮ
═══════════════════════════════════════ */
.mob-tabbar{
  display:none;
  position:fixed;
  bottom:16px;left:50%;
  transform:translateX(-50%);
  z-index:1000;
  background:var(--glass2);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border:1px solid var(--glass-edge);
  border-radius:60px;
  padding:6px 8px;
  box-shadow:var(--shadow-lg),0 0 0 0.5px rgba(0,0,0,0.05);
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  max-width:calc(100vw - 24px);
  white-space:nowrap;
  display:none;
}
.mob-tabbar::-webkit-scrollbar{display:none;}
@media(max-width:900px){
  .mob-tabbar{display:flex;align-items:center;gap:2px;}
  body{padding-bottom:90px;}
  .btt{bottom:94px;}
  .toast{bottom:94px;}
}

/* Каждый таб — pill */
.mtab{
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;
  padding:8px 14px;
  border-radius:50px;
  cursor:pointer;
  border:none;background:transparent;
  transition:all .22s cubic-bezier(.25,.46,.45,.94);
  flex-shrink:0;
  min-width:58px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}
.mtab:active{transform:scale(0.9);}
.mtab.active{
  background:var(--red-light);
}
.mtab-icon{font-size:20px;line-height:1;transition:transform .2s;}
.mtab.active .mtab-icon{transform:scale(1.1);}
.mtab-label{
  font-family:'IBM Plex Sans',sans-serif;
  font-size:10px;font-weight:500;
  color:var(--text-muted);
  transition:color .2s;
  line-height:1;
}
.mtab.active .mtab-label{color:var(--red);font-weight:700;}

/* Поиск таб — отдельный стиль */
.mtab-search{
  width:40px;height:40px;
  border-radius:50%;
  background:var(--glass-card2);
  border:var(--border-strong);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  transition:all .2s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.mtab-search:active{transform:scale(0.88);}

/* ═══════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════ */
.main-container{max-width:1320px;margin:0 auto;padding:0 28px;}
@media(max-width:600px){.main-container{padding:0 14px;}}

/* ═══════════════════════════════════════
   SECTION DIVIDER
═══════════════════════════════════════ */
.sec-div{display:flex;align-items:center;gap:14px;margin:34px 0 16px;}
.sec-div h2{font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}
.ln{flex:1;height:1px;background:linear-gradient(to right,rgba(0,0,0,0.08),transparent);}
[data-theme="dark"] .ln{background:linear-gradient(to right,rgba(255,255,255,0.09),transparent);}
.ln-s{flex:0 0 36px;}

/* ═══════════════════════════════════════
   LIVE BADGE
═══════════════════════════════════════ */
.live-badge{display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--red);background:var(--red-light);padding:3px 9px;border-radius:20px;}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.4s infinite;}

/* ═══════════════════════════════════════
   FEATURED
═══════════════════════════════════════ */
.featured-section{padding:28px 0 32px;}
.featured-grid{display:grid;grid-template-columns:1fr 330px;gap:24px;}
.featured-main{
  background:var(--glass-card2);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border-radius:28px;padding:20px;
  box-shadow:var(--shadow-md);border:1px solid var(--glass-edge);overflow:hidden;
}
.feat-img{width:100%;height:330px;object-fit:cover;border-radius:18px;cursor:pointer;transition:transform .4s;display:block;background:var(--gray-mid);}
.feat-img:hover{transform:scale(1.01);}
.art-cat-label{font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin:16px 0 9px;display:inline-flex;align-items:center;gap:6px;background:var(--red-light);padding:4px 12px 4px 10px;border-radius:30px;}
.art-cat-label::before{content:'';display:inline-block;width:5px;height:5px;background:var(--red);border-radius:50%;}
.feat-title{font-family:'Playfair Display',serif;font-size:clamp(21px,2.8vw,33px);font-weight:700;line-height:1.2;margin-bottom:13px;cursor:pointer;transition:opacity .2s;}
.feat-title:hover{opacity:.75;}
.art-lead{font-size:15px;line-height:1.7;color:var(--text-light);margin-bottom:13px;font-style:italic;}
.art-meta{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:13px;}
.rbar{display:flex;gap:6px;flex-wrap:wrap;}
.rbtn{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;border:var(--border-strong);padding:7px 13px;border-radius:40px;cursor:pointer;background:var(--glass-card);backdrop-filter:blur(8px);transition:all .2s;color:var(--text);}
.rbtn:hover{background:var(--glass-card2);transform:translateY(-1px);box-shadow:var(--shadow-xs);}
.rbtn.active{background:var(--red-light);border-color:var(--red);color:var(--red);}
.rbtn.pop{animation:popIn .3s ease;}

/* FEAT SIDEBAR */
.feat-sidebar{display:flex;flex-direction:column;gap:10px;}
.side-art{
  background:var(--glass-card2);backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border-radius:20px;overflow:hidden;cursor:pointer;
  transition:transform .25s,box-shadow .25s;border:1px solid var(--glass-edge);
  flex:1;
}
.side-art:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.side-art img{width:100%;height:110px;object-fit:cover;display:block;background:var(--gray-mid);transition:transform .4s;}
.side-art:hover img{transform:scale(1.04);}
.side-art-body{padding:10px 12px 12px;}
.scat{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
.side-art h3{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;line-height:1.3;color:var(--text);}
.feat-side-bot .side-art img{height:145px;}
.feat-side-bot .side-art h3{font-size:15px;}

/* ═══════════════════════════════════════
   ARTICLE GRID
═══════════════════════════════════════ */
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:16px;margin-bottom:14px;}
.grid-art{
  background:var(--glass-card2);backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border-radius:22px;overflow:hidden;cursor:pointer;
  transition:transform .25s,box-shadow .25s;
  border:1px solid var(--glass-edge);display:flex;flex-direction:column;
  opacity:0;
}
.grid-art.visible{opacity:1;animation:fadeInUp .48s ease forwards;}
.grid-art:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.grid-art-img-wrap{overflow:hidden;position:relative;}
.grid-art-img{width:100%;height:165px;object-fit:cover;display:block;background:var(--gray-mid);transition:transform .4s;}
.grid-art:hover .grid-art-img{transform:scale(1.05);}
.grid-art-cat-badge{position:absolute;bottom:9px;left:9px;font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:rgba(0,0,0,0.52);backdrop-filter:blur(8px);color:#fff;padding:3px 10px;border-radius:20px;}
.grid-art-body{padding:13px 15px 15px;flex:1;display:flex;flex-direction:column;}
.grid-art-cat{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin-bottom:5px;}
.grid-art-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.3;color:var(--text);margin-bottom:7px;flex:1;}
.grid-art-meta{font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:var(--text-muted);margin-bottom:9px;}
.grid-art-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.read-more{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:600;color:var(--red);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;transition:gap .2s;}
.read-more:hover{gap:7px;}

/* LOAD MORE */
.load-more-wrap{text-align:center;margin:8px 0 34px;}
.load-more-btn{font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;background:var(--glass-card2);backdrop-filter:blur(14px);border:var(--border-strong);color:var(--text);padding:13px 36px;border-radius:40px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-xs);}
.load-more-btn:hover{background:var(--red);color:#fff;border-color:var(--red);transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,30,30,0.28);}

/* ═══════════════════════════════════════
   THREE COLUMN
═══════════════════════════════════════ */
.three-col{display:grid;grid-template-columns:1fr 1fr 295px;gap:26px;margin-bottom:34px;}
.col-main{display:flex;flex-direction:column;gap:22px;}
.col-art{
  background:var(--glass-card2);backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border-radius:22px;overflow:hidden;cursor:pointer;
  transition:transform .25s,box-shadow .25s;border:1px solid var(--glass-edge);
}
.col-art:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.col-art img{width:100%;height:190px;object-fit:cover;display:block;background:var(--gray-mid);transition:transform .4s;}
.col-art:hover img{transform:scale(1.03);}
.col-art-body{padding:15px 17px 17px;}
.ccat{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin-bottom:6px;}
.col-art h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;line-height:1.3;color:var(--text);margin-bottom:8px;}
.col-art p{font-size:14px;color:var(--text-light);line-height:1.6;margin-bottom:11px;}
.rdmore{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:600;color:var(--red);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:gap .2s;}
.rdmore:hover{gap:8px;}

/* ═══════════════════════════════════════
   SIDEBAR WIDGETS
═══════════════════════════════════════ */
.col-sb,.col-sb-r{display:flex;flex-direction:column;}

/* Тренды */
.trend-list{list-style:none;}
.trend-list li{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--glass-card);backdrop-filter:blur(12px);border:1px solid var(--glass-edge);border-radius:15px;margin-bottom:6px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-xs);}
.trend-list li:hover{transform:translateX(4px);box-shadow:var(--shadow-sm);background:var(--glass-card2);}
.tnum{font-family:'IBM Plex Sans',sans-serif;font-size:17px;font-weight:800;color:var(--red);min-width:22px;line-height:1;}
.ttext .tc{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:2px;}
.ttext h4{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;line-height:1.3;color:var(--text);}

/* Афиша */
.af-item{padding:10px 13px;background:var(--glass-card);backdrop-filter:blur(12px);border:1px solid var(--glass-edge);border-radius:13px;margin-bottom:6px;display:flex;gap:10px;align-items:center;transition:all .18s;}
.af-item:hover{transform:translateX(4px);background:var(--glass-card2);}
.ad{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;color:var(--red);white-space:nowrap;min-width:60px;}
.at{font-size:13px;color:var(--text);line-height:1.4;}

/* Погода */
.weather-wrap{background:var(--glass-card);backdrop-filter:blur(12px);border-radius:14px;border:1px solid var(--glass-edge);padding:8px;overflow:hidden;box-shadow:var(--shadow-xs);}

/* Томск виджет */
.tomsk-widget{background:var(--glass-card2);backdrop-filter:blur(18px) saturate(160%);border-radius:20px;border:1px solid var(--glass-edge);padding:18px;box-shadow:var(--shadow-sm);margin-bottom:6px;}
.tw-title{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
.tw-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:var(--border);}
.tw-row:last-child{border-bottom:none;padding-bottom:0;}
.tw-label{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text-muted);}
.tw-val{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:700;color:var(--text);}
.up{color:var(--green);}.dn{color:var(--red);}

/* ═══════════════════════════════════════
   POLL BANNER
═══════════════════════════════════════ */
.poll-banner{max-width:1320px;margin:32px auto 18px;padding:22px 30px;background:var(--glass-card2);backdrop-filter:blur(20px) saturate(160%);border-radius:60px;border:1px solid var(--glass-edge);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px;box-shadow:var(--shadow-md);}
.poll-banner-left{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px;}
.poll-banner-left span:first-child{font-size:32px;}
.poll-banner-btn{font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:700;background:var(--red);color:#fff;border:none;padding:13px 36px;cursor:pointer;transition:all .25s;border-radius:60px;box-shadow:0 6px 20px rgba(196,30,30,0.33);}
.poll-banner-btn:hover{background:var(--red-hover);transform:translateY(-2px);}

/* ═══════════════════════════════════════
   3D SHOWCASE
═══════════════════════════════════════ */
.showcase-3d{padding:66px 28px;margin:36px 0 0;perspective:1200px;background:radial-gradient(ellipse at 50% 50%,rgba(196,30,30,0.03),transparent 70%);}
.showcase-container{max-width:1320px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:center;gap:32px;}
.showcase-card{background:var(--glass-card2);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);padding:34px;border-radius:38px;box-shadow:var(--shadow-lg);transform-style:preserve-3d;flex:1 1 280px;max-width:350px;border:1px solid var(--glass-edge);cursor:default;transition:transform .1s,box-shadow .3s;}
.showcase-card:hover{box-shadow:0 38px 70px -10px rgba(196,30,30,0.18);}
.showcase-icon{font-size:50px;margin-bottom:20px;transform:translateZ(28px);display:inline-block;}
.showcase-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:13px;color:var(--text);transform:translateZ(24px);}
.showcase-text{font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.7;color:var(--text-light);margin-bottom:20px;transform:translateZ(18px);}
.showcase-stats{display:flex;gap:22px;margin-top:20px;transform:translateZ(34px);}
.showcase-stat-number{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--red);line-height:1;}
.showcase-stat-label{font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
.showcase-badge{display:inline-block;background:var(--red);color:#fff;padding:5px 17px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;border-radius:60px;transform:translateZ(14px);margin-bottom:16px;box-shadow:0 4px 12px rgba(196,30,30,0.28);}
.showcase-list{list-style:none;transform:translateZ(18px);}
.showcase-list li{font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--text-light);margin-bottom:10px;display:flex;align-items:center;gap:9px;}
.showcase-list li::before{content:"✨";font-size:15px;}

/* ═══════════════════════════════════════
   FOOTER — ОРИГИНАЛЬНЫЙ
═══════════════════════════════════════ */
.footer{background:var(--footer-bg);color:var(--footer-text);padding:48px 0 24px;margin-top:0;}
.footer-inner{max-width:1300px;margin:0 auto;padding:0 24px;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:24px;}
.footer-brand p{font-size:14px;color:var(--footer-text-muted);line-height:1.7;margin-bottom:20px;}
.footer-brand img{max-width:180px;height:auto;margin-bottom:16px;background:transparent!important;filter:brightness(0) invert(1);}
.footer-col h4{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--footer-text-muted);margin-bottom:20px;}
.footer-col ul{list-style:none;}
.footer-col ul li{margin-bottom:8px;}
.footer-col ul li a{font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:#aaa;text-decoration:none;cursor:pointer;transition:color .15s;}
.footer-col ul li a:hover{color:#fff;}
.soc-row{display:flex;gap:12px;flex-wrap:wrap;}
.soc-btn{width:44px;height:44px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:60px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;text-decoration:none;}
.soc-btn:hover{background:var(--red);border-color:var(--red);transform:scale(1.1);}
.soc-btn svg{width:20px;height:20px;fill:#fff;}
.footer-bottom{display:flex;flex-direction:column;align-items:flex-start;gap:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#555;}
.footer-copyright{color:#aaa;line-height:1.6;}
.footer-rkn{color:#777;font-size:12px;}
@media(max-width:1000px){.footer-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:680px){.footer-grid{grid-template-columns:1fr;}}

/* ═══════════════════════════════════════
   MODAL OVERLAY
═══════════════════════════════════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.52);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:2000;align-items:center;justify-content:center;padding:18px;}
.overlay.open{display:flex;animation:fadeIn .2s;}
.modal-box{background:var(--glass2);backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);width:100%;max-width:760px;max-height:92vh;overflow-y:auto;border-radius:34px;box-shadow:var(--shadow-xl);position:relative;animation:scaleIn .28s cubic-bezier(.25,.46,.45,.94);border:1px solid var(--glass-edge);}
.modal-box::-webkit-scrollbar{width:4px;}
.modal-box::-webkit-scrollbar-thumb{background:var(--gray-mid);border-radius:2px;}
.modal-x{position:absolute;top:12px;right:12px;background:var(--glass-card);backdrop-filter:blur(10px);color:var(--text);border:var(--border-strong);width:34px;height:34px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;transition:all .2s;}
.modal-x:hover{background:var(--red);color:#fff;border-color:var(--red);transform:rotate(90deg);}
.modal-img{width:100%;height:260px;object-fit:cover;border-radius:34px 34px 0 0;background:var(--gray-mid);display:block;}
.modal-body{padding:26px 30px 30px;}
.mcat{font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:9px;}
.mtitle{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.22;margin-bottom:12px;color:var(--text);}
.mlead{font-size:15px;font-style:italic;color:var(--text-light);margin-bottom:20px;line-height:1.7;border-left:3px solid var(--red);padding-left:15px;}
.mmeta{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text-muted);margin-bottom:18px;padding-bottom:18px;border-bottom:var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.mcontent p{margin-bottom:14px;font-size:15px;line-height:1.8;color:var(--text-light);}
.msec-title{font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 11px;padding-top:18px;border-top:var(--border);}
.share-btns{display:flex;gap:7px;flex-wrap:wrap;}
.sbtn{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border:var(--border-strong);border-radius:40px;cursor:pointer;background:var(--glass-card);color:var(--text);transition:all .18s;}
.sbtn:hover{background:var(--glass-card2);transform:translateY(-2px);box-shadow:var(--shadow-xs);}
.cmt{background:var(--glass-card);backdrop-filter:blur(10px);border-radius:14px;padding:12px 14px;margin-bottom:9px;border:1px solid var(--glass-edge);}
.cmt-name{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text);}
.cmt-text{font-size:13px;color:var(--text-light);line-height:1.55;word-wrap:break-word;}
.cmt-time{font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:var(--text-muted);margin-top:5px;}
.cmt-actions{display:flex;gap:11px;margin-top:5px;}
.cmt-report{font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:var(--text-muted);cursor:pointer;background:none;border:none;text-decoration:underline;}
.cmt-report:hover{color:var(--red);}
.cmt-reply-btn{font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;text-decoration:underline;}
.cmt-form{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.cmt-form input,.cmt-form textarea{font-family:'Source Serif 4',serif;font-size:14px;border:var(--border-strong);padding:10px 14px;outline:none;width:100%;resize:vertical;background:var(--glass-card);color:var(--text);border-radius:18px;transition:border-color .2s;}
.cmt-form input:focus,.cmt-form textarea:focus{border-color:var(--red);}
.cmt-form button{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:var(--red);color:#fff;border:none;padding:11px 24px;cursor:pointer;align-self:flex-start;border-radius:40px;transition:all .2s;}
.cmt-form button:hover{background:var(--red-hover);transform:translateY(-2px);}
@media(max-width:540px){.modal-body{padding:18px 18px 22px;}.mtitle{font-size:21px;}}

/* ═══════════════════════════════════════
   SEARCH OVERLAY
═══════════════════════════════════════ */
.search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.58);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:3000;align-items:flex-start;justify-content:center;padding:56px 18px 18px;}
.search-overlay.open{display:flex;animation:fadeIn .2s;}
.sbox{background:var(--glass2);backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);width:100%;max-width:660px;border-radius:38px;box-shadow:var(--shadow-xl);border:1px solid var(--glass-edge);animation:slideUp .28s ease;}
.sbox-top{display:flex;border-bottom:var(--border);padding:7px;}
.sbox-top input{flex:1;min-width:0;font-family:'Playfair Display',serif;font-size:18px;border:none;padding:13px 18px;outline:none;background:transparent;color:var(--text);border-radius:38px;}
.sbox-top input::placeholder{color:var(--text-muted);}
.sbox-top button{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:700;background:var(--text);color:var(--bg);border:none;padding:0 20px;cursor:pointer;border-radius:38px;transition:background .2s;flex-shrink:0;}
.sbox-top button:hover{background:var(--red);}
.sresults{max-height:400px;overflow-y:auto;padding:7px;}
.sitem{padding:12px 14px;border-bottom:var(--border);cursor:pointer;transition:background .14s;border-radius:14px;}
.sitem:hover{background:var(--glass-card);}
.sicat{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:3px;}
.sitem h4{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);}
.sitem p{font-size:12px;color:var(--text-light);line-height:1.4;margin-top:3px;}
.snone{font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text-muted);padding:16px;text-align:center;}
.sbox-close{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text-muted);padding:12px 18px;border:none;border-top:var(--border);width:100%;text-align:left;cursor:pointer;background:none;border-radius:0 0 38px 38px;transition:background .18s;}
.sbox-close:hover{background:var(--glass-card);color:var(--text);}

/* ═══════════════════════════════════════
   WARNING MODALS
═══════════════════════════════════════ */
.warning-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(14px);z-index:4000;align-items:center;justify-content:center;padding:18px;}
.warning-overlay.open{display:flex;animation:fadeIn .2s;}
.warning-box{background:var(--glass2);backdrop-filter:blur(30px) saturate(200%);max-width:480px;width:100%;padding:34px;border-radius:38px;border-left:4px solid var(--red);box-shadow:var(--shadow-xl);animation:scaleIn .28s ease;border:1px solid var(--glass-edge);}
.warning-icon{font-size:42px;text-align:center;margin-bottom:14px;}
.warning-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:13px;color:var(--red);text-align:center;}
.warning-text{font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.7;margin-bottom:24px;color:var(--text);}
.warning-buttons{display:flex;gap:10px;justify-content:center;}
.warning-btn{font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;padding:11px 22px;border:none;cursor:pointer;transition:all .2s;border-radius:40px;flex:1;max-width:170px;}
.warning-btn-yes{background:var(--red);color:#fff;}
.warning-btn-yes:hover{background:var(--red-hover);transform:scale(1.02);}
.warning-btn-no{background:var(--glass-card);color:var(--text);border:var(--border-strong);}
.warning-btn-no:hover{background:var(--glass-card2);}

/* ═══════════════════════════════════════
   POLL MODAL
═══════════════════════════════════════ */
.poll-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(14px);z-index:3500;align-items:center;justify-content:center;padding:18px;}
.poll-overlay.open{display:flex;animation:fadeIn .2s;}
.poll-box{background:var(--glass2);backdrop-filter:blur(30px) saturate(200%);max-width:450px;width:100%;padding:34px;border-radius:38px;box-shadow:var(--shadow-xl);animation:scaleIn .28s ease;border:1px solid var(--glass-edge);}
.poll-question{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:20px;color:var(--text);}
.poll-option{display:flex;align-items:center;margin-bottom:9px;padding:11px 14px;border:var(--border-strong);border-radius:60px;cursor:pointer;transition:all .14s;background:var(--glass-card);}
.poll-option:hover{background:var(--glass-card2);border-color:var(--red);}
.poll-option input{margin-right:11px;accent-color:var(--red);width:16px;height:16px;}
.poll-option label{font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--text);cursor:pointer;flex:1;}
.poll-vote{font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:700;background:var(--red);color:#fff;border:none;padding:13px;width:100%;cursor:pointer;margin:13px 0 9px;border-radius:60px;transition:all .2s;}
.poll-vote:hover{background:var(--red-hover);transform:translateY(-2px);}
.poll-close{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text-muted);text-align:center;cursor:pointer;}
.poll-close:hover{color:var(--red);}
.poll-result-bar{height:6px;background:var(--gray-mid);border-radius:3px;margin-top:4px;overflow:hidden;}
.poll-result-fill{height:100%;background:var(--red);border-radius:3px;transition:width .6s ease;}
.poll-result-row{margin-bottom:10px;}
.poll-result-label{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text);display:flex;justify-content:space-between;margin-bottom:3px;}
.poll-result-pct{font-weight:700;color:var(--red);}

/* ═══════════════════════════════════════
   TOAST + BTT
═══════════════════════════════════════ */
.toast{position:fixed;bottom:24px;right:24px;background:#1d1d1f;color:#f5f5f7;font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:12px 22px;z-index:9999;border-radius:60px;transform:translateY(80px);opacity:0;transition:all .32s cubic-bezier(.68,-.55,.265,1.55);max-width:300px;box-shadow:var(--shadow-lg);}
.toast.show{transform:translateY(0);opacity:1;}
[data-theme="dark"] .toast{background:#f2f2f7;color:#1d1d1f;}
.btt{position:fixed;bottom:24px;left:24px;background:var(--glass-card2);backdrop-filter:blur(14px);color:var(--text);border:var(--border-strong);width:46px;height:46px;border-radius:60px;font-size:17px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:500;transition:all .2s;box-shadow:var(--shadow-md);}
.btt.visible{display:flex;}
.btt:hover{background:var(--red);color:#fff;border-color:var(--red);transform:scale(1.1) translateY(-2px);}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(max-width:1100px){
  .featured-grid{grid-template-columns:1fr;}
  .feat-sidebar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .three-col{grid-template-columns:1fr 260px;}

  .footer-grid{grid-template-columns:1fr 1fr;}
}

  .poll-banner{flex-direction:column;text-align:center;padding:22px;border-radius:28px;}
  .poll-banner-btn{width:100%;}
  .showcase-container{gap:18px;}
  .footer-grid{grid-template-columns:1fr;}
}
/* ═══════════════════════════════════════
   NAV DROPDOWN — РАЗДЕЛЫ
═══════════════════════════════════════ */
.nav-dropdown{position:relative;display:inline-block;}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--glass2);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border:var(--border-strong);border-radius:22px;box-shadow:var(--shadow-lg);padding:8px;min-width:200px;z-index:500;animation:scaleIn .2s ease;}
.dropdown-menu.open{display:block;}
.dropdown-menu button{display:block;width:100%;text-align:left;font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:10px 16px;background:none;border:none;cursor:pointer;color:var(--text);border-radius:14px;transition:background .14s;}
.dropdown-menu button:hover{background:var(--red-light);color:var(--red);}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
.mob-sections-sheet{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:800;align-items:flex-end;justify-content:center;}

.mob-sheet-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.mob-sheet-grid button{font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:12px 8px;background:var(--glass-card);border:var(--border-strong);border-radius:18px;cursor:pointer;color:var(--text);text-align:center;transition:all .15s;}

.mob-sheet-close{display:block;width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;padding:13px;background:var(--glass-card2);border:var(--border-strong);border-radius:60px;cursor:pointer;color:var(--text);transition:all .2s;}

        <p><strong>1. ОБЩИЕ СВЕДЕНИЯ ОБ ИЗДАНИИ</strong></p>
        <p>The Tomsk Times — информационный ресурс, освещающий события в городе Томске и Томской области. Сайт создан с целью оперативного и достоверного информирования жителей региона о наиболее значимых происшествиях, социальных, экономических, культурных и политических событиях.</p>
        <p>Издание не зарегистрировано в качестве средства массовой информации и функционирует в соответствии с частью 2 статьи 1 Закона РФ от 27.12.1991 № 2124-1 «О средствах массовой информации» (для сайтов, не являющихся СМИ), при этом редакция добровольно соблюдает нормы журналистской этики и профессиональные стандарты, принятые в российском информационном пространстве.</p>
        
        <p style="margin-top: 20px;"><strong>2. МИССИЯ И ЦЕЛИ ДЕЯТЕЛЬНОСТИ</strong></p>
        <p>Миссия The Tomsk Times заключается в формировании качественного информационного поля Томской области, основанного на принципах достоверности, оперативности и объективности.</p>
        <p>Основными целями деятельности редакции являются:</p>
        <p>Информирование жителей Томска и области о событиях, представляющих общественный интерес;<br>

        Противодействие распространению недостоверной информации;<br>
        Создание площадки для конструктивного диалога между властью, обществом и бизнесом;<br>

        <p style="margin-top: 20px;"><strong>3. РЕДАКЦИОННАЯ ПОЛИТИКА И ПРИНЦИПЫ РАБОТЫ</strong></p>

        <p>3.3. Принцип объективности. Редакция стремится к всестороннему освещению событий, предоставляя слово различным сторонам и учитывая множество точек зрения. Материалы не должны отражать личные предпочтения или политические пристрастия авторов и редакции, если иное не оговорено в жанре публикации (аналитика, комментарий, редакционная колонка).</p>
        <p>3.4. Принцип уважения к аудитории. Редакция признает право читателей на собственное мнение и стремится к конструктивному диалогу. Модерация комментариев осуществляется с целью поддержания цивилизованной дискуссии и недопущения оскорблений, разжигания вражды и распространения незаконной информации.</p>
        <p>3.5. Принцип защиты авторских прав. Редакция уважает интеллектуальную собственность и соблюдает требования части четвертой Гражданского кодекса Российской Федерации. При использовании материалов третьих лиц редакция руководствуется положениями статьи 1274 ГК РФ о свободном использовании произведений в информационных, научных, учебных или культурных целях с обязательным указанием имени автора и источника заимствования.</p>
        
        <p style="margin-top: 20px;"><strong>4. СТРУКТУРА РЕДАКЦИИ И КАДРОВЫЙ СОСТАВ</strong></p>

        <p>Отдел расследований и спецпроектов — готовит аналитические материалы и журналистские расследования в рамках, допустимых законодательством РФ.</p>

async function fetchCurrency(){
  try{
    const r = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
    const d = await r.json();
    const usd = d.Valute.USD, eur = d.Valute.EUR;
    const uV = usd.Value.toFixed(2), eV = eur.Value.toFixed(2);
    ['usdRate'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=uV+' ₽';});
    ['eurRate'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=eV+' ₽';});
    const wU=document.getElementById('widgetUsd'),wE=document.getElementById('widgetEur');
    if(wU)wU.textContent=uV+' ₽'; if(wE)wE.textContent=eV+' ₽';
    const wwU=document.getElementById('weatherWidgetUsd'),wwE=document.getElementById('weatherWidgetEur');
    if(wwU)wwU.textContent=uV+' ₽'; if(wwE)wwE.textContent=eV+' ₽';
    const ud=(usd.Value-usd.Previous).toFixed(2), ed=(eur.Value-eur.Previous).toFixed(2);
    const uC=document.getElementById('usdChange'); if(uC){uC.textContent=(ud>0?'▲':'▼')+Math.abs(ud);uC.style.color=ud>0?'#34c759':'#ff453a';}
    const eC=document.getElementById('eurChange'); if(eC){eC.textContent=(ed>0?'▲':'▼')+Math.abs(ed);eC.style.color=ed>0?'#34c759':'#ff453a';}
  }catch{
    const fb=[['usdRate','79.15 ₽'],['eurRate','91.84 ₽'],['widgetUsd','79.15 ₽'],['widgetEur','91.84 ₽']];
    fb.forEach(([id,v])=>{const e=document.getElementById(id);if(e)e.textContent=v;});
  }
}
fetchCurrency();

function applyFontSize(){
  const size = 16 + fontDelta;
  document.documentElement.style.setProperty('--fs', size+'px');
  document.body.style.fontSize = size+'px';
  showToast('Шрифт: '+size+'px');
}
document.getElementById('fsMinus').addEventListener('click', ()=>{
  fontDelta = Math.max(-4, fontDelta - 1);
  applyFontSize();
});
document.getElementById('fsPlus').addEventListener('click', ()=>{
  fontDelta = Math.min(5, fontDelta + 1);
  applyFontSize();
});

// ── THEME ─────────────────────────────────────────
function initTheme(){
  const t = localStorage.getItem('theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  updateLogos(t);
}
function updateLogos(t){
  const dark = t==='dark';
  const src = dark?'https://i.ibb.co/V00QxH77/2026-03-08-032105.png':'https://i.ibb.co/7t5smVmQ/image-384abc20-2.png';
  ['logoImage','scrollLogoImg','preloaderLogo'].forEach(id=>{const e=document.getElementById(id);if(e)e.src=src;});
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  updateLogos(next);
}
function toggleHighContrast(){
  const cur = document.documentElement.getAttribute('data-theme');
  if(cur==='high-contrast'){
    const prev = localStorage.getItem('prevTheme')||'light';
    document.documentElement.setAttribute('data-theme',prev);
    localStorage.setItem('theme',prev);
    updateLogos(prev);
  } else {
    localStorage.setItem('prevTheme',cur);
    document.documentElement.setAttribute('data-theme','high-contrast');
    localStorage.setItem('theme','high-contrast');
  }
}
initTheme();

// ── FILTER + GRID (ГЛАВНАЯ СТРАНИЦА) ──────────────
const gridObs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('visible'); gridObs.unobserve(e.target); } });
},{threshold:0.06});

function filterCat(cat, btnEl){
  currentCat = cat; visibleCount = 9;
  const tEl = document.getElementById('gridTitle');
  if(tEl) tEl.textContent = cat||'Все новости';
  renderGrid();
}

function renderGrid(){
  const filtered = currentCat ? arts.filter(a=>a.cat===currentCat) : arts;
  const toShow = filtered.slice(0, visibleCount);
  const grid = document.getElementById('artGrid'); if(!grid) return;
  grid.innerHTML = toShow.map((a,i)=>`
    <div class="grid-art" onclick="openArticle(${a.id})" style="animation-delay:${i*0.04}s">
      <div class="grid-art-img-wrap">
        <img src="${IMG[a.id]||PLACEHOLDER}" alt="${a.title}" class="grid-art-img" loading="lazy" onerror="this.src='${PLACEHOLDER}'">
        <div class="grid-art-cat-badge">${a.cat}</div>
      </div>
      <div class="grid-art-body">
        <div class="grid-art-cat">${a.cat}</div>
        <div class="grid-art-title">${a.title}</div>
        <div class="grid-art-meta">${a.author} · ${a.date} · 👁 ${a.views.toLocaleString('ru-RU')}</div>
        <div class="grid-art-footer">
          <div class="rbar" style="gap:4px">
            <button class="rbtn" style="font-size:11px;padding:5px 10px" onclick="event.stopPropagation();react(this)">👍 <span class="cnt">${Math.floor(a.views*0.05)}</span></button>
          </div>
          <button class="read-more" onclick="event.stopPropagation();openArticle(${a.id})">Читать <span>→</span></button>
        </div>
      </div>
    </div>`).join('');
  grid.querySelectorAll('.grid-art').forEach(el=>gridObs.observe(el));
  const lmw = document.getElementById('loadMoreWrap');
  if(lmw) lmw.style.display = filtered.length>visibleCount ? 'block' : 'none';
}

function loadMore(){ visibleCount += 6; renderGrid(); }

function openArticle(id){
  if(shockIds.includes(id)){ pendingId=id; pendingType='shock'; document.getElementById('shockWarn').classList.add('open'); document.body.style.overflow='hidden'; return; }
  if(unverifiedIds.includes(id)){ pendingId=id; pendingType='unverified'; document.getElementById('unverifiedWarn').classList.add('open'); document.body.style.overflow='hidden'; return; }
  _showArt(id);
}
function proceedWarn(type){
  closeWarn(type==='shock'?'shockWarn':'unverifiedWarn');
  if(pendingId!==null){ _showArt(pendingId); pendingId=null; }
}
function closeWarn(id){ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }

function _showArt(id){
  const a = arts.find(x=>x.id===id); if(!a) return;
  curArt = a;
  const mImg = document.getElementById('mImg');
  mImg.src = IMG[a.id]||PLACEHOLDER;
  mImg.onerror = ()=>mImg.src=PLACEHOLDER;
  document.getElementById('mCat').textContent = a.cat;
  document.getElementById('mTitle').textContent = a.title;
  document.getElementById('mLead').textContent = a.lead;
  document.getElementById('mMeta').innerHTML = `<strong>${a.author}</strong><span>·</span><span>${a.date}</span><span>·</span><span>👁 ${a.views.toLocaleString('ru-RU')}</span><span>·</span><span style="font-size:11px">⏱ ~${Math.ceil(a.content.length/900)} мин</span>`;
  document.getElementById('mContent').innerHTML = a.content.split('\n').filter(p=>p.trim()).map(p=>`<p>${p}</p>`).join('');
  document.getElementById('mReactions').innerHTML = `
    <button class="rbtn" onclick="react(this)">👍 <span class="cnt">${Math.floor(a.views*0.05)}</span></button>
    <button class="rbtn" onclick="react(this)">❤️ <span class="cnt">${Math.floor(a.views*0.02)}</span></button>
    <button class="rbtn" onclick="react(this)">😮 <span class="cnt">${Math.floor(a.views*0.01)}</span></button>
    <button class="rbtn" onclick="react(this)">😠 <span class="cnt">${Math.floor(a.views*0.003)}</span></button>`;
  renderCmts(id);
  document.getElementById('artModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  replyTo = null;
}
function closeModal(){
  document.getElementById('artModal').classList.remove('open');
  document.body.style.overflow = '';
  curArt = null; replyTo = null;
}

// ── COMMENTS ──────────────────────────────────────
function renderCmts(id){
  const cmts = cmtStore[id]||[];
  function html(c,d){
    const ml = Math.min(d*16,48);
    return `<div class="cmt" style="margin-left:${ml}px;max-width:calc(100%-${ml}px)">
      <div class="cmt-name">${c.name}</div>
      <div class="cmt-text">${c.text}</div>
      <div class="cmt-time">${c.time}</div>
      <div class="cmt-actions">
        ${c.reported?'<span style="font-size:11px;color:var(--red)">⚠️ Жалоба отправлена</span>':`<button class="cmt-report" onclick="reportCmt(${id},${c.id})">Пожаловаться</button>`}
        <button class="cmt-reply-btn" onclick="setReply(${c.id})">Ответить</button>
      </div>
      ${(c.replies||[]).map(r=>html(r,d+1)).join('')}
    </div>`;
  }
  document.getElementById('cmtList').innerHTML = cmts.length ? cmts.map(c=>html(c,0)).join('') : '<p style="font-family:\'IBM Plex Sans\',sans-serif;font-size:13px;color:var(--text-muted);padding:10px 0">Пока нет комментариев. Будьте первым!</p>';
  document.getElementById('cmtCount').textContent = `(${cmts.length})`;
}
function setReply(cid){ replyTo=cid; document.getElementById('cmtText').placeholder='Ваш ответ...'; document.getElementById('cmtText').focus(); showToast('Вы отвечаете на комментарий'); }
function reportCmt(aid,cid){
  function find(arr,id){for(let c of arr){if(c.id===id){c.reported=true;return true;}if(find(c.replies||[],id))return true;}return false;}
  if(cmtStore[aid]&&find(cmtStore[aid],cid)){renderCmts(aid);showToast('⚠️ Жалоба отправлена');}
}
function hasBad(s){return badWords.some(w=>s.toLowerCase().includes(w));}
function addComment(){
  const name = document.getElementById('cmtName').value.trim();
  const text = document.getElementById('cmtText').value.trim();
  if(!name||!text){showToast('Заполните имя и текст');return;}
  if(hasBad(text)||hasBad(name)){showToast('❌ Недопустимые выражения');return;}
  const id = curArt.id;
  if(!cmtStore[id]) cmtStore[id]=[];
  const n = new Date();
  const nc = {id:Date.now(),name,text,time:`${n.getDate()} марта, ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`,reported:false,replies:[]};
  if(replyTo!==null){
    function add(arr){for(let c of arr){if(c.id===replyTo){c.replies.push(nc);return true;}if(add(c.replies||[]))return true;}return false;}
    if(!add(cmtStore[id])) cmtStore[id].push(nc);
  } else cmtStore[id].push(nc);
  document.getElementById('cmtName').value=''; document.getElementById('cmtText').value='';
  document.getElementById('cmtText').placeholder='Ваш комментарий...'; replyTo=null;
  renderCmts(id); showToast('💬 Комментарий добавлен');
}
function react(btn){
  const c = btn.querySelector('.cnt');
  if(btn.classList.contains('active')){ btn.classList.remove('active'); if(c)c.textContent=Math.max(0,parseInt(c.textContent)-1); }
  else{ btn.classList.add('active'); btn.classList.add('pop'); setTimeout(()=>btn.classList.remove('pop'),380); if(c)c.textContent=parseInt(c.textContent)+1; }
}

  document.getElementById('searchOverlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('sInput').value='';
}
function doSearch(){
  const q = document.getElementById('sInput').value.toLowerCase().trim();
  const res = document.getElementById('sResults');
  if(!q){res.innerHTML='<div class="snone">Введите запрос...</div>';return;}
  const found = arts.filter(a=>a.title.toLowerCase().includes(q)||a.lead.toLowerCase().includes(q)||a.cat.toLowerCase().includes(q));
  if(!found.length){res.innerHTML=`<div class="snone">По «${q}» ничего не найдено</div>`;return;}
  const hl=(s,q)=>s.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:var(--red);color:#fff;padding:1px 4px;border-radius:4px">$1</mark>');
  res.innerHTML = found.map(a=>`<div class="sitem" onclick="closeSearch();openArticle(${a.id})"><div class="sicat">${a.cat} · ${a.date}</div><h4>${hl(a.title,q)}</h4><p>${hl(a.lead.slice(0,80),q)}…</p></div>`).join('');
}

// ── POLL ──────────────────────────────────────────
let pollVotes=[0,0,0,0], voted=false;
const pollL=['Очень нравится','Нормально, но есть что улучшить','Так себе, неудобно','Всё равно'];
function openPoll(){ document.getElementById('pollOverlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closePoll(){ document.getElementById('pollOverlay').classList.remove('open'); document.body.style.overflow=''; }
function votePoll(){
  if(voted){showToast('Вы уже голосовали');return;}
  const sel = document.querySelector('input[name="poll"]:checked');
  if(!sel){showToast('Выберите вариант');return;}
  pollVotes[parseInt(sel.value)]++;
  voted=true;
  const total = pollVotes.reduce((a,b)=>a+b,0);
  document.getElementById('pollResults').innerHTML = pollL.map((l,i)=>{
    const p = total>0?Math.round(pollVotes[i]/total*100):0;
    return `<div class="poll-result-row"><div class="poll-result-label"><span>${l}</span><span class="poll-result-pct">${p}%</span></div><div class="poll-result-bar"><div class="poll-result-fill" style="width:${p}%"></div></div></div>`;
  }).join('');
  document.getElementById('pollResults').style.display='block';
  document.getElementById('pollOptions').style.display='none';
  document.getElementById('pollVoteBtn').style.display='none';
  showToast('Спасибо за голос!');
}

function init3D(){

// ── HASH ROUTER — СТРАНИЦЫ ────────────────────────
const PAGES = ['home','news','weather','about'];
let currentPage = 'home';

function showPage(name){
  if(!PAGES.includes(name)) name = 'home';
  currentPage = name;
  PAGES.forEach(p=>{
    const el = document.getElementById('page-'+p);
    if(el) el.style.display = p===name ? '' : 'none';
  });
  // Активная кнопка в nav
  ['navHome','navNews','navWeather','navAbout'].forEach(id=>{
    const el = document.getElementById(id); if(!el) return;
    const map = {navHome:'home',navNews:'news',navWeather:'weather',navAbout:'about'};
    el.classList.toggle('active', map[id]===name);
  });
  document.getElementById('navSections')?.classList.remove('active');
  closeSectionsDropdown();
  // Обновить hash
  location.hash = name==='home' ? '' : name;
  window.scrollTo({top:0,behavior:'smooth'});
  // Инициализация страниц
  if(name==='news') renderNewsGrid();
  if(name==='about') setTimeout(init3DAbout,100);
  if(name==='weather'){
    // Перезапустить погодный виджет если нужно
    if(typeof __weatherwidget_init === 'function') __weatherwidget_init();
    // Обновить курс на странице погоды
    const u=document.getElementById('weatherWidgetUsd'), ev=document.getElementById('weatherWidgetEur');
    const mainU=document.getElementById('widgetUsd'), mainE=document.getElementById('widgetEur');
    if(u&&mainU) u.textContent=mainU.textContent;
    if(ev&&mainE) ev.textContent=mainE.textContent;
  }
}

// Читаем hash при загрузке
function initRouter(){
  const h = location.hash.replace('#','').trim();
  showPage(PAGES.includes(h) ? h : 'home');
}
window.addEventListener('hashchange', ()=>{
  const h = location.hash.replace('#','').trim();
  showPage(PAGES.includes(h) ? h : 'home');
});

// ── NEWS PAGE GRID ─────────────────────────────────
let newsCurrentCat = '';
let newsVisibleCount = 18;

function newsFilterCat(cat){
  newsCurrentCat = cat;
  newsVisibleCount = 18;
  // Подсветка активного фильтра
  document.querySelectorAll('#newsFilterBar .npill').forEach(b=>{
    const t = b.textContent.trim();
    b.classList.toggle('active', (cat===''&&t==='Все')||(cat!==''&&t===cat));
  });
  const titleEl = document.getElementById('newsPageTitle');
  if(titleEl) titleEl.textContent = cat || 'Все новости';
  renderNewsGrid();
}

function renderNewsGrid(){
  const filtered = newsCurrentCat ? arts.filter(a=>a.cat===newsCurrentCat) : arts;
  const toShow = filtered.slice(0, newsVisibleCount);
  const grid = document.getElementById('newsGrid'); if(!grid) return;
  grid.innerHTML = toShow.map((a,i)=>`
    <div class="grid-art" onclick="openArticle(${a.id})" style="animation-delay:${i*0.03}s">
      <div class="grid-art-img-wrap">
        <img src="${IMG[a.id]||PLACEHOLDER}" alt="${a.title}" class="grid-art-img" loading="lazy" onerror="this.src='${PLACEHOLDER}'">
        <div class="grid-art-cat-badge">${a.cat}</div>
      </div>
      <div class="grid-art-body">
        <div class="grid-art-cat">${a.cat}</div>
        <div class="grid-art-title">${a.title}</div>
        <div class="grid-art-meta">${a.author} · ${a.date} · 👁 ${a.views.toLocaleString('ru-RU')}</div>
        <div class="grid-art-footer">
          <div class="rbar" style="gap:4px">
            <button class="rbtn" style="font-size:11px;padding:5px 10px" onclick="event.stopPropagation();react(this)">👍 <span class="cnt">${Math.floor(a.views*0.05)}</span></button>
          </div>
          <button class="read-more" onclick="event.stopPropagation();openArticle(${a.id})">Читать <span>→</span></button>
        </div>
      </div>
    </div>`).join('');
  grid.querySelectorAll('.grid-art').forEach(el=>gridObs.observe(el));
  const lmw = document.getElementById('newsLoadMoreWrap');
  if(lmw) lmw.style.display = filtered.length>newsVisibleCount ? 'block' : 'none';
}

function newsLoadMore(){ newsVisibleCount += 9; renderNewsGrid(); }
